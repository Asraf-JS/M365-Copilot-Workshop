<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ page.title }} | M365 Copilot Workshop</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1E2761;--teal:#028090;--teal-light:#E0F4F7;
  --text-dark:#1A1A2E;--text-mid:#4A5568;--text-muted:#8A9BB0;
  --bg:#F7F9FC;--white:#fff;--border:#E2E6EA;--green:#1D6F42;
}
body{font-family:'Georgia',serif;background:var(--bg);display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:200px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.logo-tag{font-family:'Trebuchet MS',sans-serif;font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--teal);text-transform:uppercase;}
.logo-title{font-family:'Trebuchet MS',sans-serif;font-size:12px;font-weight:700;color:var(--navy);line-height:1.3;margin-top:3px;}
.nav-scroll{flex:1;overflow-y:auto;padding:10px 0 12px;}
.nav-scroll::-webkit-scrollbar{width:3px;}
.nav-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.nav-label{font-family:'Trebuchet MS',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase;padding:0 14px;margin-bottom:6px;}
.nav-item{display:flex;align-items:center;gap:7px;padding:5px 10px 5px 14px;text-decoration:none;border-radius:5px;margin:1px 4px;transition:background .12s;}
.nav-item:hover{background:#eef2f7;}
.nav-item.active{background:var(--teal-light);}
.nav-num{font-family:'Trebuchet MS',sans-serif;font-size:9px;font-weight:700;color:var(--teal);min-width:16px;flex-shrink:0;}
.nav-name{font-family:'Trebuchet MS',sans-serif;font-size:11px;color:var(--text-mid);line-height:1.3;}
.nav-item.active .nav-name{color:var(--navy);font-weight:700;}
.sidebar-footer{padding:10px 14px;border-top:1px solid var(--border);}
.sidebar-footer a{display:block;font-family:'Trebuchet MS',sans-serif;font-size:10px;color:var(--teal);text-decoration:none;padding:3px 0;}
.sidebar-footer a:hover{text-decoration:underline;}

/* MAIN WRAPPER — fills space to right of sidebar */
.main-wrap{margin-left:200px;flex:1;display:flex;justify-content:center;background:var(--bg);}

/* CONTENT — constrained width, centered */
.main{width:100%;max-width:740px;padding:44px 48px 80px;}

.main h1{font-family:'Trebuchet MS',sans-serif;font-size:26px;font-weight:700;color:var(--navy);margin-bottom:10px;line-height:1.2;}
.main h2{font-family:'Trebuchet MS',sans-serif;font-size:17px;font-weight:700;color:var(--navy);margin:28px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.main h3{font-family:'Trebuchet MS',sans-serif;font-size:14px;font-weight:700;color:var(--text-mid);margin:18px 0 8px;}
.main p{font-size:14px;color:var(--text-dark);line-height:1.75;margin-bottom:14px;}
.main ul,.main ol{font-size:14px;color:var(--text-dark);line-height:1.75;margin:0 0 14px 20px;}
.main li{margin-bottom:4px;}
.main a{color:var(--teal);text-decoration:none;}
.main a:hover{text-decoration:underline;}
.main strong{font-weight:700;}
.main em{font-style:italic;color:var(--text-mid);}
.main blockquote{background:var(--teal-light);border-left:3px solid var(--teal);border-radius:0 6px 6px 0;padding:12px 16px;margin:16px 0;}
.main blockquote p{font-size:13px;margin:0;}
.main table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px;}
.main th{background:var(--navy);color:#fff;font-family:'Trebuchet MS',sans-serif;font-weight:700;padding:9px 12px;text-align:left;}
.main td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top;}
.main tr:nth-child(even) td{background:var(--white);}
.main img{max-width:100%;border-radius:6px;border:1px solid var(--border);margin:12px 0;display:block;}
.main hr{border:none;border-top:1px solid var(--border);margin:24px 0;}
.main code{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:12px;font-family:'Courier New',monospace;}
.main pre{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:14px 16px;font-family:'Courier New',monospace;font-size:12.5px;line-height:1.65;overflow-x:auto;margin:10px 0 18px;}
.main pre code{background:none;border:none;padding:0;font-size:12.5px;}

@media(max-width:680px){
  .sidebar{display:none;}
  .main-wrap{margin-left:0;}
  .main{padding:24px 20px 60px;}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-tag">M365 Workshop</div>
    <div class="logo-title">Copilot Training<br>May 2026</div>
  </div>
  <div class="nav-scroll">
    <div class="nav-label">Topics</div>
    <a class="nav-item{% if page.url contains '01-copilot' %} active{% endif %}" href="/M365-Copilot-Workshop/01-copilot-fundamentals/"><span class="nav-num">01</span><span class="nav-name">Fundamentals</span></a>
    <a class="nav-item{% if page.url contains '02-prompt' %} active{% endif %}" href="/M365-Copilot-Workshop/02-prompt-engineering/"><span class="nav-num">02</span><span class="nav-name">Prompt Engineering</span></a>
    <a class="nav-item{% if page.url contains '03-copilot-chat' %} active{% endif %}" href="/M365-Copilot-Workshop/03-copilot-chat/"><span class="nav-num">03</span><span class="nav-name">Copilot Chat</span></a>
    <a class="nav-item{% if page.url contains '04-copilot-pages' %} active{% endif %}" href="/M365-Copilot-Workshop/04-copilot-pages/"><span class="nav-num">04</span><span class="nav-name">Copilot Pages</span></a>
    <a class="nav-item{% if page.url contains '05-copilot-word' %} active{% endif %}" href="/M365-Copilot-Workshop/05-copilot-word/"><span class="nav-num">05</span><span class="nav-name">Copilot in Word</span></a>
    <a class="nav-item{% if page.url contains '06-copilot-outlook' %} active{% endif %}" href="/M365-Copilot-Workshop/06-copilot-outlook/"><span class="nav-num">06</span><span class="nav-name">Copilot in Outlook</span></a>
    <a class="nav-item{% if page.url contains '07-copilot-powerpoint' %} active{% endif %}" href="/M365-Copilot-Workshop/07-copilot-powerpoint/"><span class="nav-num">07</span><span class="nav-name">Copilot in PowerPoint</span></a>
    <a class="nav-item{% if page.url contains '08-copilot-forms' %} active{% endif %}" href="/M365-Copilot-Workshop/08-copilot-forms/"><span class="nav-num">08</span><span class="nav-name">Copilot in Forms</span></a>
    <a class="nav-item{% if page.url contains '09-copilot-excel' %} active{% endif %}" href="/M365-Copilot-Workshop/09-copilot-excel/"><span class="nav-num">09</span><span class="nav-name">Copilot in Excel</span></a>
    <a class="nav-item{% if page.url contains '10-copilot-studio' %} active{% endif %}" href="/M365-Copilot-Workshop/10-copilot-studio-intro/"><span class="nav-num">10</span><span class="nav-name">Copilot Studio</span></a>
  </div>
  <div class="sidebar-footer">
    <a href="/M365-Copilot-Workshop/">Home</a>
    <a href="https://github.com/Asraf-JS/M365-Copilot-Workshop" target="_blank">GitHub Repo</a>
    <a href="https://github.com/Asraf-JS/M365-Copilot-Workshop/raw/main/09-copilot-excel/AI_Guideline_Survey_Responses.xlsx">Sample Data</a>
  </div>
</div>

<div class="main-wrap">
  <div class="main">
    {{ content }}
  </div>
</div>

</body>
</html>
